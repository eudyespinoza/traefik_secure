services:
  traefik:
    image: traefik:v3.6.1
    container_name: traefik-secureapprove
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --accesslog=true
      - --accesslog.format=json
      - --accesslog.fields.defaultmode=keep
      - --accesslog.fields.names.RouterName=keep
      - --accesslog.fields.names.ServiceName=keep
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

      # Certificados TLS de las apps publicadas (SecureApprove y DistroMaxi)
      # Opcion A (portable): pone los .crt/.key en ./certs/secureapprove
      - ./certs/secureapprove:/certs/secureapprove:ro
      # Opcion B (server): monta el directorio real del server
      # - /etc/ssl/secureapprove:/certs/secureapprove:ro

    networks:
      - secureapprove_proxy
    restart: unless-stopped

networks:
  secureapprove_proxy:
    external: true
